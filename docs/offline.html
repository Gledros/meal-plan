<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#2f6d4f" />
		<title>Sin conexion | Plan alimenticio</title>
		<style>
			:root {
				color-scheme: light;
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
			}

			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				padding: 1.25rem;
				background: radial-gradient(circle at top, #dbeedc 0%, #f4f7ef 60%);
				color: #1f2e23;
			}

			.card {
				max-width: 28rem;
				background: #ffffffcc;
				backdrop-filter: blur(6px);
				border: 1px solid #c8dac8;
				border-radius: 1rem;
				padding: 1.25rem;
				box-shadow: 0 10px 30px #2f6d4f1a;
			}

			h1 {
				margin: 0 0 0.75rem;
				font-size: 1.2rem;
			}

			p {
				margin: 0 0 1rem;
				line-height: 1.5;
			}

			a {
				display: inline-block;
				padding: 0.65rem 1rem;
				border-radius: 0.6rem;
				background: #2f6d4f;
				color: #ffffff;
				text-decoration: none;
				font-weight: 600;
			}
		</style>
	</head>
	<body>
		<main class="card">
			<h1>Estas sin conexion</h1>
			<p>
				La app sigue funcionando con el contenido en cache. Cuando vuelvas a tener internet,
				podras actualizar datos nuevos.
			</p>
			<a href="/">Volver al inicio</a>
		</main>
	</body>
</html>
